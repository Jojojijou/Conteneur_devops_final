apiVersion: v1
kind: Service # Type de ressource service

metadata:
  name: nginx # Nom de la ressource

spec:
  type: NodePort
  selector:
    app: web # Pour tous les pods avec le label "web" (défini dans le fichier deployment)

  ports: # On ouvre les ports xxxx : (ici 80 pour http)
    - port: 80
      targetPort: 80
      nodePort: 30080
